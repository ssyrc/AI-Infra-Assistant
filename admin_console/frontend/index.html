<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agent Platform · 운영 콘솔</title>
<!-- 폐쇄망: /vendor 로컬 파일 사용. dev(인터넷 가능): 파일이 없으면 CDN으로 폴백. -->
<script>
  function loadScript(localSrc, cdnSrc, cb) {
    var s = document.createElement("script");
    s.src = localSrc;
    s.onload = cb;
    s.onerror = function () {
      var f = document.createElement("script");
      f.src = cdnSrc; f.onload = cb; document.head.appendChild(f);
    };
    document.head.appendChild(s);
  }
</script>
<script>
  loadScript("/vendor/react.production.min.js", "https://unpkg.com/react@18/umd/react.production.min.js", function () {
    loadScript("/vendor/react-dom.production.min.js", "https://unpkg.com/react-dom@18/umd/react-dom.production.min.js", function () {
      loadScript("/vendor/babel.min.js", "https://unpkg.com/@babel/standalone/babel.min.js", function () {
        window.__depsReady && window.__depsReady();
      });
    });
  });
</script>
<style>
  :root {
    --bg: #12151a;
    --panel: #1a1e25;
    --panel-2: #20242c;
    --border: #262b33;
    --text: #d7dce2;
    --muted: #7b8492;
    --accent: #3ea88f;   /* published / enabled / success */
    --warn: #d3a54a;     /* draft */
    --danger: #cc6558;   /* archived / disabled / error */
    --mono: ui-monospace, "JetBrains Mono", "SFMono-Regular", Menlo, monospace;
    --sans: -apple-system, "Segoe UI", "Pretendard", system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; }
  #root { display: flex; min-height: 100vh; }

  .sidebar { width: 220px; flex-shrink: 0; background: var(--panel); border-right: 1px solid var(--border); padding: 20px 0; }
  .sidebar h1 { font-size: 14px; letter-spacing: 0.02em; color: var(--muted); padding: 0 20px 16px; margin: 0; text-transform: uppercase; }
  .nav-item { padding: 10px 20px; cursor: pointer; color: var(--muted); border-left: 2px solid transparent; font-size: 13.5px; }
  .nav-item:hover { color: var(--text); }
  .nav-item.active { color: var(--text); border-left-color: var(--accent); background: var(--panel-2); }

  .main { flex: 1; padding: 28px 36px; max-width: 1180px; }
  .main h2 { font-size: 18px; margin: 0 0 4px; }
  .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 20px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: var(--muted); font-weight: 500; padding: 8px 10px; border-bottom: 1px solid var(--border); font-size: 12px; text-transform: uppercase; letter-spacing: 0.03em; }
  td { padding: 9px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:hover td { background: var(--panel-2); }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-family: var(--mono); border-left: 3px solid; }
  .badge.published, .badge.true, .badge.enabled, .badge.success { border-color: var(--accent); color: var(--accent); background: rgba(62,168,143,0.1); }
  .badge.draft { border-color: var(--warn); color: var(--warn); background: rgba(211,165,74,0.1); }
  .badge.archived, .badge.false, .badge.disabled, .badge.error, .badge.blocked { border-color: var(--danger); color: var(--danger); background: rgba(204,101,88,0.1); }

  button { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 6px 12px; font-size: 12.5px; cursor: pointer; }
  button:hover { border-color: var(--muted); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #0d1310; font-weight: 600; }
  button.danger { color: var(--danger); border-color: var(--danger); background: transparent; }
  input, textarea, select { background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 4px; padding: 6px 8px; font-size: 13px; font-family: var(--sans); }
  textarea { width: 100%; font-family: var(--mono); font-size: 12.5px; }

  .toolbar { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 16px; margin-bottom: 16px; }
  .chunk { border: 1px solid var(--border); border-radius: 5px; padding: 10px; margin-bottom: 8px; background: var(--panel-2); }
  .chunk .meta { color: var(--muted); font-size: 11px; font-family: var(--mono); margin-bottom: 6px; display: flex; justify-content: space-between; }
  .row-actions { display: flex; gap: 6px; }
  .empty { color: var(--muted); padding: 30px 0; text-align: center; font-size: 13px; }
  .switch { position: relative; width: 36px; height: 20px; display: inline-block; }
  .switch input { display: none; }
  .switch .track { position: absolute; inset: 0; background: var(--danger); border-radius: 10px; cursor: pointer; transition: 0.15s; }
  .switch input:checked + .track { background: var(--accent); }
  .switch .thumb { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: #0d1310; border-radius: 50%; transition: 0.15s; }
  .switch input:checked ~ .thumb { transform: translateX(16px); }
  pre.result { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 8px; font-size: 11.5px; max-width: 320px; overflow: auto; white-space: pre-wrap; font-family: var(--mono); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback } = React;

async function api(path, options = {}) {
  const res = await fetch(path, {
    ...options,
    headers: { "Content-Type": "application/json", ...(options.headers || {}) },
  });
  if (!res.ok) {
    const text = await res.text();
    throw new Error(`${res.status}: ${text}`);
  }
  const ct = res.headers.get("content-type") || "";
  return ct.includes("application/json") ? res.json() : null;
}

function Badge({ value }) {
  const label = typeof value === "boolean" ? (value ? "enabled" : "disabled") : value;
  return <span className={`badge ${String(value)}`}>{label}</span>;
}

// ---------------------------------------------------------------- Manuals
function ManualsPanel() {
  const [manuals, setManuals] = useState([]);
  const [detail, setDetail] = useState(null);
  const [versions, setVersions] = useState([]);
  const [title, setTitle] = useState("");
  const [file, setFile] = useState(null);
  const [busy, setBusy] = useState(false);

  // 정제 옵션 (업로드 시 공통 적용)
  const [opts, setOpts] = useState({ strip_html: true, collapse_space: true, drop_urls: false, include_speaker_notes: false });

  // 문서(docx/pptx/pdf/txt/md) 미리보기 결과
  const [docPreview, setDocPreview] = useState(null); // {upload_id, ext, total_chunks, preview_chunks}
  // 엑셀 미리보기 결과 + 컬럼 선택 상태
  const [excelPreview, setExcelPreview] = useState(null); // {upload_id, columns, sample_rows, total_rows}
  const [contentCols, setContentCols] = useState([]);
  const [titleCol, setTitleCol] = useState("");

  const load = useCallback(async () => setManuals(await api("/api/manuals")), []);
  useEffect(() => { load(); }, [load]);

  const openDetail = async (id) => {
    setDetail(await api(`/api/manuals/${id}`));
    setVersions(await api(`/api/manuals/${id}/versions`));
  };

  const extOf = (f) => (f ? f.name.slice(f.name.lastIndexOf(".")).toLowerCase() : "");
  const isExcel = (f) => [".xlsx", ".xls"].includes(extOf(f));
  const fileKind = (f) => {
    const e = extOf(f);
    if ([".xlsx", ".xls"].includes(e)) return "엑셀 (열 선택)";
    if (e === ".pptx") return "PPT (슬라이드 단위)";
    if ([".docx", ".pdf"].includes(e)) return "문서 (섹션 단위)";
    if ([".txt", ".md"].includes(e)) return "텍스트 (문단 단위)";
    return "";
  };

  const resetPreviews = () => { setDocPreview(null); setExcelPreview(null); setContentCols([]); setTitleCol(""); };

  const analyze = async () => {
    if (!file || !title) return alert("제목과 파일을 먼저 선택하세요.");
    setBusy(true);
    resetPreviews();
    try {
      if (isExcel(file)) {
        const fd = new FormData();
        fd.append("file", file);
        fd.append("strip_html", opts.strip_html);
        fd.append("collapse_space", opts.collapse_space);
        fd.append("drop_urls", opts.drop_urls);
        const r = await fetch("/api/manuals/excel/preview", { method: "POST", body: fd });
        if (!r.ok) throw new Error(await r.text());
        setExcelPreview(await r.json());
      } else {
        const fd = new FormData();
        fd.append("file", file);
        fd.append("strip_html", opts.strip_html);
        fd.append("collapse_space", opts.collapse_space);
        fd.append("drop_urls", opts.drop_urls);
        fd.append("include_speaker_notes", opts.include_speaker_notes);
        const r = await fetch("/api/manuals/preview", { method: "POST", body: fd });
        if (!r.ok) throw new Error(await r.text());
        setDocPreview(await r.json());
      }
    } catch (e) { alert("전처리 실패: " + e.message); }
    setBusy(false);
  };

  const commitDoc = async () => {
    setBusy(true);
    try {
      await api("/api/manuals/commit", {
        method: "POST",
        body: JSON.stringify({ upload_id: docPreview.upload_id, title }),
      });
      resetPreviews(); setTitle(""); setFile(null);
      await load();
      alert("등록 완료. 목록에서 청크를 확인·교정한 뒤 발행하세요.");
    } catch (e) { alert("등록 실패: " + e.message); }
    setBusy(false);
  };

  const commitExcel = async () => {
    if (contentCols.length === 0) return alert("내용으로 쓸 열을 1개 이상 선택하세요.");
    setBusy(true);
    try {
      await api("/api/manuals/excel/commit", {
        method: "POST",
        body: JSON.stringify({
          upload_id: excelPreview.upload_id, title,
          content_columns: contentCols, title_column: titleCol || null,
        }),
      });
      resetPreviews(); setTitle(""); setFile(null);
      await load();
      alert("엑셀 등록 완료. 목록에서 확인 후 발행하세요.");
    } catch (e) { alert("등록 실패: " + e.message); }
    setBusy(false);
  };

  const toggleContentCol = (c) =>
    setContentCols((p) => (p.includes(c) ? p.filter((x) => x !== c) : [...p, c]));

  const saveChunk = async (chunkId, text) => {
    const fd = new FormData();
    fd.append("chunk_text", text);
    await fetch(`/api/manuals/chunks/${chunkId}`, { method: "PATCH", body: fd });
  };
  const deleteChunk = async (chunkId) => {
    await api(`/api/manuals/chunks/${chunkId}`, { method: "DELETE" });
    openDetail(detail.file.id);
  };
  const publish = async (id) => { await api(`/api/manuals/${id}/publish`, { method: "POST" }); await load(); openDetail(id); };
  const unpublish = async (id) => {
    if (!confirm("발행을 취소하면 즉시 검색·조회에서 제외됩니다. 계속할까요?")) return;
    try { await api(`/api/manuals/${id}/unpublish`, { method: "POST" }); await load(); openDetail(id); }
    catch (e) { alert(e.message); }
  };
  const remove = async (id) => {
    if (!confirm("이 버전을 삭제할까요?")) return;
    try { await api(`/api/manuals/${id}`, { method: "DELETE" }); setDetail(null); await load(); }
    catch (e) { alert(e.message); }
  };

  const OptToggles = () => (
    <div style={{display: "flex", gap: 16, fontSize: 12.5, color: "var(--muted)", flexWrap: "wrap"}}>
      <label><input type="checkbox" checked={opts.strip_html} onChange={e => setOpts({...opts, strip_html: e.target.checked})} /> HTML 태그·엔티티 제거</label>
      <label><input type="checkbox" checked={opts.collapse_space} onChange={e => setOpts({...opts, collapse_space: e.target.checked})} /> 공백·빈 줄 정리</label>
      <label><input type="checkbox" checked={opts.drop_urls} onChange={e => setOpts({...opts, drop_urls: e.target.checked})} /> URL 제거</label>
      <label><input type="checkbox" checked={opts.include_speaker_notes} onChange={e => setOpts({...opts, include_speaker_notes: e.target.checked})} /> PPT 발표자 노트 포함</label>
    </div>
  );

  return (
    <div>
      <h2>매뉴얼 관리</h2>
      <div className="subtitle">
        PPT·Word·PDF·txt는 파일 형식에 맞춰 자동 분할되고, 엑셀은 열을 골라 등록합니다.
        업로드 시 HTML·불필요한 문자는 자동으로 정제됩니다. 같은 제목으로 재업로드하면 새 버전이 생깁니다.
      </div>

      <div className="card">
        <div className="toolbar">
          <input placeholder="문서 제목 (버전 그룹핑 키)" value={title} onChange={e => setTitle(e.target.value)} style={{width: 260}} />
          <input type="file" accept=".xlsx,.xls,.docx,.pptx,.pdf,.txt,.md"
                 onChange={e => { setFile(e.target.files[0]); resetPreviews(); }} />
          {file && <span className="badge" style={{borderColor: "var(--muted)", color: "var(--muted)"}}>{fileKind(file)}</span>}
          <button className="primary" disabled={busy} onClick={analyze}>{busy ? "처리 중..." : "전처리 미리보기"}</button>
        </div>
        <div style={{marginTop: 10}}><OptToggles /></div>
      </div>

      {/* 문서 미리보기 */}
      {docPreview && (
        <div className="card">
          <div className="toolbar" style={{justifyContent: "space-between"}}>
            <div><strong>미리보기</strong> · {docPreview.filename} · 총 {docPreview.total_chunks}개 청크
              {docPreview.total_chunks > docPreview.preview_chunks.length && ` (아래는 앞 ${docPreview.preview_chunks.length}개)`}</div>
            <div className="row-actions">
              <button className="primary" disabled={busy} onClick={commitDoc}>이대로 등록</button>
              <button onClick={() => { setDocPreview(null); analyze(); }}>정제 옵션 다시 적용</button>
              <button onClick={resetPreviews}>취소</button>
            </div>
          </div>
          <div>
            {docPreview.preview_chunks.map(c => (
              <div className="chunk" key={c.seq}>
                <div className="meta"><span>{c.section_title || "(제목 없음)"} {c.page_no ? `· p${c.page_no}` : ""} · #{c.seq} · {c.char_count}자</span></div>
                <div style={{whiteSpace: "pre-wrap", fontSize: 12.5}}>{c.chunk_text}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* 엑셀 열 선택 */}
      {excelPreview && (
        <div className="card">
          <div style={{marginBottom: 8}}><strong>엑셀 열 선택</strong> · {excelPreview.filename} · 시트 {excelPreview.sheet} · {excelPreview.total_rows}행</div>
          <div className="subtitle">DB에 저장할 열을 고르세요. 선택한 열들이 <code>열이름: 값</code> 형태로 한 행씩 하나의 검색 청크가 됩니다 (예: question / answer).</div>
          <table style={{marginBottom: 12}}>
            <thead><tr><th>내용</th><th>제목</th><th>열 이름</th><th>샘플 값</th></tr></thead>
            <tbody>
              {excelPreview.columns.map((col, i) => (
                <tr key={col + i}>
                  <td><input type="checkbox" checked={contentCols.includes(col)} onChange={() => toggleContentCol(col)} /></td>
                  <td><input type="radio" name="tc" checked={titleCol === col} onChange={() => setTitleCol(col)} /></td>
                  <td style={{fontFamily: "var(--mono)"}}>{col}</td>
                  <td style={{color: "var(--muted)", fontSize: 12}}>{excelPreview.sample_rows.map(r => r[i]).filter(v => v).slice(0, 3).join(" · ")}</td>
                </tr>
              ))}
            </tbody>
          </table>
          <div className="row-actions">
            <button className="primary" disabled={busy} onClick={commitExcel}>선택한 열로 등록</button>
            {titleCol && <button onClick={() => setTitleCol("")}>제목 열 해제</button>}
            <button onClick={resetPreviews}>취소</button>
          </div>
        </div>
      )}

      <table>
        <thead><tr><th>제목</th><th>버전</th><th>상태</th><th>유형</th><th>파일명</th><th>업로드</th></tr></thead>
        <tbody>
          {manuals.map(m => (
            <tr key={m.id} onClick={() => openDetail(m.id)} style={{cursor: "pointer"}}>
              <td>{m.title}</td>
              <td>v{m.version}</td>
              <td><Badge value={m.status} /></td>
              <td style={{fontSize: 12, color: "var(--muted)"}}>{m.source_type === "spreadsheet" ? "엑셀" : "문서"}</td>
              <td>{m.filename}</td>
              <td style={{fontSize: 12}}>{m.uploaded_by} · {new Date(m.uploaded_at).toLocaleDateString()}</td>
            </tr>
          ))}
          {manuals.length === 0 && <tr><td colSpan="6" className="empty">등록된 매뉴얼이 없습니다.</td></tr>}
        </tbody>
      </table>

      {detail && (
        <div className="card" style={{marginTop: 20}}>
          <div className="toolbar" style={{justifyContent: "space-between"}}>
            <div><strong>{detail.file.title}</strong> · v{detail.file.version} <Badge value={detail.file.status} /></div>
            <div className="row-actions">
              {detail.file.status !== "published" && <button className="primary" onClick={() => publish(detail.file.id)}>발행</button>}
              {detail.file.status === "published" && <button className="danger" onClick={() => unpublish(detail.file.id)}>발행취소</button>}
              {detail.file.status !== "published" && <button className="danger" onClick={() => remove(detail.file.id)}>삭제</button>}
              <button onClick={() => setDetail(null)}>닫기</button>
            </div>
          </div>
          {versions.length > 1 && (
            <div style={{margin: "10px 0", fontSize: 12.5}}>
              버전 이력: {versions.map(v => (
                <span key={v.id} style={{marginRight: 10}}>
                  v{v.version} <Badge value={v.status} />
                  {v.status === "archived" && <button style={{marginLeft: 4}} onClick={() => publish(v.id)}>롤백</button>}
                </span>
              ))}
            </div>
          )}
          <div style={{marginTop: 12}}>
            {detail.file.status !== "draft" && (
              <div className="subtitle" style={{color: "var(--warn)"}}>
                {detail.file.status === "published"
                  ? "발행 중인 버전은 읽기 전용입니다. 내용을 바꾸려면 발행취소 후 교정하거나, 같은 제목으로 새 버전을 업로드하세요."
                  : "보관된 버전은 읽기 전용입니다. 다시 발행(롤백)하거나 같은 제목으로 새 버전을 업로드하세요."}
              </div>
            )}
            {detail.chunks.map(c => (
              <div className="chunk" key={c.id}>
                <div className="meta">
                  <span>{c.section_title || "(제목 없음)"} {c.page_no ? `· p${c.page_no}` : ""} · #{c.seq} {c.embedded ? "· 임베딩됨" : "· 미임베딩(발행 시 처리)"}</span>
                  {detail.file.status === "draft" && <button className="danger" onClick={() => deleteChunk(c.id)}>삭제</button>}
                </div>
                <textarea defaultValue={c.chunk_text}
                  readOnly={detail.file.status !== "draft"}
                  style={detail.file.status !== "draft" ? {opacity: 0.65, cursor: "not-allowed"} : {}}
                  rows={Math.min(10, Math.max(2, Math.ceil(c.chunk_text.length / 90)))}
                  onBlur={e => { if (detail.file.status === "draft" && e.target.value !== c.chunk_text) saveChunk(c.id, e.target.value); }} />
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}


// ---------------------------------------------------------------- VOC
function VocPanel() {
  const [items, setItems] = useState([]);
  const [q, setQ] = useState("");
  const [form, setForm] = useState({ question: "", answer: "", department: "", resolved: true });
  const [editingId, setEditingId] = useState(null);

  const load = useCallback(async () => {
    const qs = q ? `?q=${encodeURIComponent(q)}` : "";
    setItems(await api(`/api/voc${qs}`));
  }, [q]);
  useEffect(() => { load(); }, [load]);

  const submit = async () => {
    if (!form.question || !form.answer) return alert("질문/답변을 입력하세요.");
    if (editingId) {
      await api(`/api/voc/${editingId}`, { method: "PATCH", body: JSON.stringify(form) });
    } else {
      await api("/api/voc", { method: "POST", body: JSON.stringify(form) });
    }
    setForm({ question: "", answer: "", department: "", resolved: true });
    setEditingId(null);
    load();
  };

  const edit = (row) => { setForm(row); setEditingId(row.id); };
  const remove = async (id) => { if (confirm("삭제할까요?")) { await api(`/api/voc/${id}`, { method: "DELETE" }); load(); } };

  const importFile = async (f) => {
    const fd = new FormData();
    fd.append("file", f);
    const r = await fetch("/api/voc/import", { method: "POST", body: fd });
    const data = await r.json();
    if (!r.ok) return alert("가져오기 실패: " + JSON.stringify(data));
    alert(`${data.inserted}건 등록됨`);
    load();
  };

  return (
    <div>
      <h2>VOC 이력 관리</h2>
      <div className="subtitle">사용자/운영자 질의응답 이력. VOC MCP가 이 데이터를 하이브리드 검색합니다.</div>

      <div className="card">
        <div className="toolbar">
          <input placeholder="질문" value={form.question} onChange={e => setForm({...form, question: e.target.value})} style={{flex: 1}} />
          <input placeholder="부서(선택)" value={form.department || ""} onChange={e => setForm({...form, department: e.target.value})} style={{width: 140}} />
          <label style={{fontSize: 12.5}}><input type="checkbox" checked={form.resolved} onChange={e => setForm({...form, resolved: e.target.checked})} /> 해결됨</label>
        </div>
        <textarea placeholder="답변" value={form.answer} onChange={e => setForm({...form, answer: e.target.value})} rows={3} style={{width: "100%", marginTop: 8}} />
        <div className="toolbar" style={{marginTop: 8}}>
          <button className="primary" onClick={submit}>{editingId ? "수정 저장" : "등록"}</button>
          {editingId && <button onClick={() => { setEditingId(null); setForm({ question: "", answer: "", department: "", resolved: true }); }}>취소</button>}
          <span style={{marginLeft: "auto"}}>
            <input type="file" accept=".xlsx" onChange={e => e.target.files[0] && importFile(e.target.files[0])} />
            <span style={{fontSize: 11.5, color: "var(--muted)", marginLeft: 6}}>엑셀 일괄 등록 (question, answer, department, resolved)</span>
          </span>
        </div>
      </div>

      <div className="toolbar">
        <input placeholder="질문 검색..." value={q} onChange={e => setQ(e.target.value)} style={{width: 260}} />
      </div>

      <table>
        <thead><tr><th>질문</th><th>답변</th><th>부서</th><th>해결</th><th>등록일</th><th></th></tr></thead>
        <tbody>
          {items.map(v => (
            <tr key={v.id}>
              <td style={{maxWidth: 260}}>{v.question}</td>
              <td style={{maxWidth: 320}}>{v.answer}</td>
              <td>{v.department || "-"}</td>
              <td><Badge value={v.resolved} /></td>
              <td>{new Date(v.created_at).toLocaleDateString()}</td>
              <td className="row-actions">
                <button onClick={() => edit(v)}>편집</button>
                <button className="danger" onClick={() => remove(v.id)}>삭제</button>
              </td>
            </tr>
          ))}
          {items.length === 0 && <tr><td colSpan="6" className="empty">기록이 없습니다.</td></tr>}
        </tbody>
      </table>
    </div>
  );
}

// ---------------------------------------------------------------- Commands
function CommandsPanel() {
  const [items, setItems] = useState([]);
  const [form, setForm] = useState({ name: "", description: "", usage: "", category: "" });
  const [editingId, setEditingId] = useState(null);
  const [busy, setBusy] = useState(false);

  // 엑셀 미리보기 + 열 매핑 상태
  const [excel, setExcel] = useState(null); // {upload_id, filename, columns, sample_rows, total_rows}
  const [map, setMap] = useState({ name_column: "", description_column: "", usage_column: "", category_column: "" });

  const load = useCallback(async () => setItems(await api("/api/commands")), []);
  useEffect(() => { load(); }, [load]);

  const submit = async () => {
    if (!form.name || !form.description) return alert("이름/설명을 입력하세요.");
    try {
      if (editingId) await api(`/api/commands/${editingId}`, { method: "PATCH", body: JSON.stringify(form) });
      else await api("/api/commands", { method: "POST", body: JSON.stringify(form) });
      setForm({ name: "", description: "", usage: "", category: "" });
      setEditingId(null);
      load();
    } catch (e) { alert(e.message); }
  };

  const edit = (row) => { setForm(row); setEditingId(row.id); };
  const remove = async (id) => { if (confirm("삭제할까요?")) { await api(`/api/commands/${id}`, { method: "DELETE" }); load(); } };

  const analyzeExcel = async (f) => {
    if (!f) return;
    setBusy(true);
    setExcel(null);
    try {
      const fd = new FormData();
      fd.append("file", f);
      const r = await fetch("/api/commands/excel/preview", { method: "POST", body: fd });
      if (!r.ok) throw new Error(await r.text());
      const data = await r.json();
      setExcel(data);
      // 열 이름 자동 추정
      const guess = (cands) => data.columns.find(c => cands.some(k => c.toLowerCase().includes(k))) || "";
      setMap({
        name_column: guess(["name", "이름", "커맨드", "command", "명령"]),
        description_column: guess(["desc", "설명", "내용"]),
        usage_column: guess(["usage", "사용", "예시", "example"]),
        category_column: guess(["cat", "분류", "카테고리"]),
      });
    } catch (e) { alert("전처리 실패: " + e.message); }
    setBusy(false);
  };

  const commitExcel = async () => {
    if (!map.name_column || !map.description_column) return alert("이름/설명 열을 지정하세요.");
    setBusy(true);
    try {
      const data = await api("/api/commands/excel/commit", {
        method: "POST",
        body: JSON.stringify({
          upload_id: excel.upload_id,
          name_column: map.name_column,
          description_column: map.description_column,
          usage_column: map.usage_column || null,
          category_column: map.category_column || null,
        }),
      });
      setExcel(null);
      await load();
      alert(`엑셀 반영 완료 · 신규 ${data.inserted}건, 갱신 ${data.updated}건`);
    } catch (e) { alert("등록 실패: " + e.message); }
    setBusy(false);
  };

  const colSelect = (field, label, required) => (
    <label style={{fontSize: 12.5, display: "flex", flexDirection: "column", gap: 4}}>
      <span style={{color: "var(--muted)"}}>{label}{required ? " *" : ""}</span>
      <select value={map[field]} onChange={e => setMap({...map, [field]: e.target.value})}>
        <option value="">(선택 안 함)</option>
        {excel.columns.map(c => <option key={c} value={c}>{c}</option>)}
      </select>
    </label>
  );

  return (
    <div>
      <h2>커맨드 카탈로그</h2>
      <div className="subtitle">
        Command MCP가 조회하는 시스템 활용 커맨드 목록 (정보 제공용, 실행은 System MCP 담당).
        등록 시 의미 검색용 임베딩이 생성되어, 사용자가 설명형으로 물어도 적절한 커맨드를 찾습니다.
      </div>

      <div className="card">
        <div className="toolbar">
          <input placeholder="커맨드 이름" value={form.name} onChange={e => setForm({...form, name: e.target.value})} style={{width: 200}} />
          <input placeholder="카테고리(선택)" value={form.category || ""} onChange={e => setForm({...form, category: e.target.value})} style={{width: 160}} />
        </div>
        <textarea placeholder="설명" value={form.description} onChange={e => setForm({...form, description: e.target.value})} rows={2} style={{width: "100%", marginTop: 8}} />
        <textarea placeholder="사용법(예시)" value={form.usage || ""} onChange={e => setForm({...form, usage: e.target.value})} rows={2} style={{width: "100%", marginTop: 8}} />
        <div className="toolbar" style={{marginTop: 8}}>
          <button className="primary" onClick={submit}>{editingId ? "수정 저장" : "등록"}</button>
          {editingId && <button onClick={() => { setEditingId(null); setForm({ name: "", description: "", usage: "", category: "" }); }}>취소</button>}
          <span style={{marginLeft: "auto"}}>
            <input type="file" accept=".xlsx,.xls" disabled={busy}
                   onChange={e => { analyzeExcel(e.target.files[0]); e.target.value = ""; }} />
            <span style={{fontSize: 11.5, color: "var(--muted)", marginLeft: 6}}>엑셀 일괄 업로드 (열 매핑)</span>
          </span>
        </div>
      </div>

      {/* 엑셀 열 매핑 */}
      {excel && (
        <div className="card">
          <div style={{marginBottom: 8}}><strong>엑셀 열 매핑</strong> · {excel.filename} · 시트 {excel.sheet} · {excel.total_rows}행</div>
          <div className="subtitle">각 항목에 대응하는 엑셀 열을 고르세요. 이름 기준으로 등록/갱신(upsert)됩니다.</div>
          <div style={{display: "flex", gap: 16, flexWrap: "wrap", marginBottom: 12}}>
            {colSelect("name_column", "이름(name)", true)}
            {colSelect("description_column", "설명(description)", true)}
            {colSelect("usage_column", "사용법(usage)", false)}
            {colSelect("category_column", "카테고리(category)", false)}
          </div>
          {excel.sample_rows.length > 0 && (
            <table style={{marginBottom: 12}}>
              <thead><tr>{excel.columns.map(c => <th key={c}>{c}</th>)}</tr></thead>
              <tbody>
                {excel.sample_rows.map((r, i) => (
                  <tr key={i}>{excel.columns.map((c, j) => (
                    <td key={j} style={{color: "var(--muted)", fontSize: 12, maxWidth: 220}}>{r[j]}</td>
                  ))}</tr>
                ))}
              </tbody>
            </table>
          )}
          <div className="row-actions">
            <button className="primary" disabled={busy} onClick={commitExcel}>매핑대로 일괄 등록</button>
            <button onClick={() => setExcel(null)}>취소</button>
          </div>
        </div>
      )}

      <table>
        <thead><tr><th>이름</th><th>설명</th><th>카테고리</th><th>검색</th><th>수정일</th><th></th></tr></thead>
        <tbody>
          {items.map(c => (
            <tr key={c.id}>
              <td style={{fontFamily: "var(--mono)"}}>{c.name}</td>
              <td>{c.description}</td>
              <td>{c.category || "-"}</td>
              <td style={{fontSize: 11.5, color: "var(--muted)"}}>{c.embedded ? "의미+키워드" : "키워드만"}</td>
              <td>{new Date(c.updated_at).toLocaleDateString()}</td>
              <td className="row-actions">
                <button onClick={() => edit(c)}>편집</button>
                <button className="danger" onClick={() => remove(c.id)}>삭제</button>
              </td>
            </tr>
          ))}
          {items.length === 0 && <tr><td colSpan="6" className="empty">등록된 커맨드가 없습니다.</td></tr>}
        </tbody>
      </table>
    </div>
  );
}

// ---------------------------------------------------------------- System
function SystemPanel() {
  const [whitelist, setWhitelist] = useState([]);
  const [logs, setLogs] = useState([]);
  const [tab, setTab] = useState("whitelist");
  const [edits, setEdits] = useState({}); // tool_name -> {description, roles}

  const loadWhitelist = useCallback(async () => setWhitelist(await api("/api/system/whitelist")), []);
  const loadLogs = useCallback(async () => setLogs(await api("/api/system/logs")), []);
  useEffect(() => { loadWhitelist(); loadLogs(); }, [loadWhitelist, loadLogs]);

  const patch = async (name, body) => {
    await api(`/api/system/whitelist/${encodeURIComponent(name)}`, { method: "PATCH", body: JSON.stringify(body) });
    await loadWhitelist();
  };
  const toggle = (name, enabled) => patch(name, { enabled });

  const baseEdit = (w) => ({
    description: w.description_override || "",
    roles: (w.required_roles || []).join(", "),
  });
  const editOf = (w) => edits[w.tool_name] || baseEdit(w);
  const setEdit = (name, patchObj) =>
    setEdits(p => {
      const w = whitelist.find(x => x.tool_name === name);
      const base = p[name] || baseEdit(w);
      return { ...p, [name]: { ...base, ...patchObj } };
    });

  const saveMeta = async (w) => {
    const e = editOf(w);
    const roles = e.roles.split(",").map(s => s.trim()).filter(Boolean);
    await patch(w.tool_name, { description: e.description, required_roles: roles });
    setEdits(p => { const n = { ...p }; delete n[w.tool_name]; return n; });
    alert("저장했습니다. (설명 변경은 System MCP 재시작 후 에이전트에 반영됩니다)");
  };

  return (
    <div>
      <h2>System MCP</h2>
      <div className="subtitle">화이트리스트 함수의 활성/비활성·설명·필요 역할을 편집하고 실행 감사로그를 봅니다. 새 함수 자체 추가는 System MCP 코드 배포가 필요합니다.</div>

      <div className="toolbar">
        <button className={tab === "whitelist" ? "primary" : ""} onClick={() => setTab("whitelist")}>화이트리스트</button>
        <button className={tab === "logs" ? "primary" : ""} onClick={() => setTab("logs")}>실행 로그</button>
      </div>

      {tab === "whitelist" && (
        <div>
          <div className="card" style={{fontSize: 12.5, color: "var(--muted)"}}>
            <div>· <strong style={{color: "var(--accent)"}}>사용자 범위</strong> 툴은 <code>user_id</code>를 LLM에 노출하지 않고 호출자 본인 id로 고정합니다(남의 자원 조회 불가).</div>
            <div style={{marginTop: 4}}>· <strong style={{color: "var(--warn)"}}>필요 역할</strong>을 지정하면 해당 역할 보유자만 실행할 수 있습니다. 단, 현재 역할 공급원이 없으므로(사용자 id만 전달됨) 역할을 지정하면 그 툴은 전원 실행 거부됩니다. 역할 연동 전에는 비워 두세요.</div>
          </div>
          {whitelist.map(w => {
            const e = editOf(w);
            const dirty = w.tool_name in edits;
            return (
              <div className="card" key={w.tool_name}>
                <div className="toolbar" style={{justifyContent: "space-between"}}>
                  <div>
                    <span style={{fontFamily: "var(--mono)"}}>{w.tool_name}</span>
                    {w.user_scoped && <span className="badge enabled" style={{marginLeft: 8}}>사용자 범위</span>}
                  </div>
                  <div style={{display: "flex", alignItems: "center", gap: 8}}>
                    <label className="switch">
                      <input type="checkbox" checked={w.enabled} onChange={ev => toggle(w.tool_name, ev.target.checked)} />
                      <span className="track"></span><span className="thumb"></span>
                    </label>
                    <Badge value={w.enabled} />
                  </div>
                </div>
                <div style={{marginTop: 8, fontSize: 12.5, color: "var(--muted)"}}>설명 (에이전트가 보는 툴 설명)</div>
                <textarea rows={2} style={{width: "100%", marginTop: 4}}
                  placeholder={w.code_description}
                  value={e.description}
                  onChange={ev => setEdit(w.tool_name, { description: ev.target.value })} />
                <div style={{display: "flex", gap: 8, alignItems: "flex-end", marginTop: 8, flexWrap: "wrap"}}>
                  <label style={{fontSize: 12.5, color: "var(--muted)", flex: 1}}>
                    <div>필요 역할 (쉼표로 구분, 비우면 제한 없음)</div>
                    <input style={{width: "100%", marginTop: 4}} placeholder="예: ops-admin, sre"
                      value={e.roles}
                      onChange={ev => setEdit(w.tool_name, { roles: ev.target.value })} />
                  </label>
                  <button className="primary" disabled={!dirty} onClick={() => saveMeta(w)}>저장</button>
                  {dirty && <button onClick={() => setEdits(p => { const n = { ...p }; delete n[w.tool_name]; return n; })}>되돌리기</button>}
                </div>
                <div style={{marginTop: 6, fontSize: 11.5, color: "var(--muted)"}}>
                  {w.updated_by ? `최근 변경: ${w.updated_by} · ${new Date(w.updated_at).toLocaleString()}` : "변경 이력 없음(코드 기본값)"}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {tab === "logs" && (
        <table>
          <thead><tr><th>시각</th><th>툴</th><th>요청자</th><th>상태</th><th>파라미터</th><th>결과</th></tr></thead>
          <tbody>
            {logs.map(l => (
              <tr key={l.id}>
                <td style={{fontSize: 11.5}}>{new Date(l.created_at).toLocaleString()}</td>
                <td style={{fontFamily: "var(--mono)"}}>{l.tool_name}</td>
                <td>{l.requested_by}</td>
                <td><Badge value={l.status} /></td>
                <td><pre className="result">{JSON.stringify(l.params, null, 1)}</pre></td>
                <td><pre className="result">{JSON.stringify(l.result, null, 1)}</pre></td>
              </tr>
            ))}
            {logs.length === 0 && <tr><td colSpan="6" className="empty">실행 이력이 없습니다.</td></tr>}
          </tbody>
        </table>
      )}
    </div>
  );
}

// ---------------------------------------------------------------- Settings
function SettingsPanel() {
  const [settings, setSettings] = useState([]);
  const [edits, setEdits] = useState({}); // key -> new value

  const load = useCallback(async () => setSettings(await api("/api/settings")), []);
  useEffect(() => { load(); }, [load]);

  const save = async (key) => {
    if (!(key in edits)) return;
    await api(`/api/settings/${encodeURIComponent(key)}`, { method: "PUT", body: JSON.stringify({ value: edits[key] }) });
    const next = { ...edits }; delete next[key]; setEdits(next);
    await load();
    alert("저장했습니다.");
  };

  const grouped = {
    "인프라 주소 (LLM / 리랭커 / 스케줄러)": settings.filter(s =>
      s.key === "vllm_llm_base_url" || s.key === "vllm_embed_base_url"
      || s.key === "rerank_base_url" || s.key === "scheduler_api_base_url"),
    "모델 / 임베딩": settings.filter(s =>
      s.key === "vllm_llm_model" || s.key === "vllm_embed_model" || s.key === "embed_dim"),
    "검색 품질 (리랭커/캐시)": settings.filter(s =>
      (s.key.startsWith("rerank_") && s.key !== "rerank_base_url")
      || s.key === "embed_cache_ttl_seconds" || s.key === "clean_policy_version"
      || s.key.startsWith("search_") || s.key.startsWith("upload_")),
    "MCP 엔드포인트": settings.filter(s => s.key.endsWith("_mcp_url")),
    "에이전트 지시문": settings.filter(s => s.key === "agent_system_instruction"),
    "데이터베이스 · 시크릿 (.env로 관리)": settings.filter(s => s.env_managed),
  };
  const shown = new Set(Object.values(grouped).flat().map(s => s.key));
  const others = settings.filter(s => !shown.has(s.key));
  if (others.length) grouped["기타"] = others;

  return (
    <div>
      <h2>설정</h2>
      <div className="subtitle">
        LLM·리랭커·스케줄러 주소, MCP 엔드포인트, 에이전트 지시문을 여기서 관리합니다(런타임 단일 소스).
        <span className="badge enabled" style={{marginLeft: 8}}>즉시 반영</span>은 재시작 없이 적용,
        <span className="badge disabled" style={{marginLeft: 6}}>재시작 필요</span>는 해당 서비스 재시작 후 반영됩니다.
        <br />
        <span className="badge disabled" style={{marginLeft: 0, marginTop: 4, display: "inline-block"}}>.env 관리</span>
        {" "}표시된 DB/시크릿은 배포 시 <code>.env</code> 한 파일에서 관리되며(부트스트랩), 여기서는 읽기 전용입니다.
      </div>

      {Object.entries(grouped).map(([group, rows]) => rows.length > 0 && (
        <div className="card" key={group}>
          <div style={{marginBottom: 10}}><strong>{group}</strong></div>
          {rows.map(s => {
            const isLong = s.key === "agent_system_instruction";
            const val = s.key in edits ? edits[s.key] : (s.is_secret ? "" : s.value);
            return (
              <div key={s.key} style={{marginBottom: 14}}>
                <div style={{fontSize: 12.5, marginBottom: 4}}>
                  <span style={{fontFamily: "var(--mono)"}}>{s.key}</span>
                  {s.env_managed
                    ? <span className="badge disabled" style={{marginLeft: 8}}>.env 관리</span>
                    : <span className={`badge ${s.hot_reload ? "enabled" : "disabled"}`} style={{marginLeft: 8}}>
                        {s.hot_reload ? "즉시 반영" : "재시작 필요"}
                      </span>}
                  {s.description && <span style={{color: "var(--muted)", marginLeft: 8}}>{s.description}</span>}
                </div>
                {s.env_managed ? (
                  <div style={{fontFamily: "var(--mono)", fontSize: 12.5, color: "var(--muted)",
                               padding: "6px 8px", background: "var(--bg)", border: "1px solid var(--border)", borderRadius: 4}}>
                    {s.value || "(비어 있음)"} <span style={{color: "var(--warn)"}}>· .env에서 수정 후 재시작</span>
                  </div>
                ) : (
                  <div style={{display: "flex", gap: 8, alignItems: "flex-start"}}>
                    {isLong ? (
                      <textarea
                        style={{flex: 1}} rows={10}
                        placeholder={s.is_secret ? `(현재: ${s.value})` : ""}
                        value={val}
                        onChange={e => setEdits({ ...edits, [s.key]: e.target.value })}
                      />
                    ) : (
                      <input
                        style={{flex: 1}}
                        placeholder={s.is_secret ? `(마스킹됨: ${s.value})` : ""}
                        value={val}
                        onChange={e => setEdits({ ...edits, [s.key]: e.target.value })}
                      />
                    )}
                    <button className="primary" disabled={!(s.key in edits)} onClick={() => save(s.key)}>저장</button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

// ---------------------------------------------------------------- App
function App() {
  const [tab, setTab] = useState("manuals");
  const tabs = [
    { id: "manuals", label: "매뉴얼" },
    { id: "voc", label: "VOC 이력" },
    { id: "commands", label: "커맨드 카탈로그" },
    { id: "system", label: "System MCP" },
    { id: "settings", label: "설정" },
  ];
  return (
    <React.Fragment>
      <div className="sidebar">
        <h1>Agent Platform</h1>
        {tabs.map(t => (
          <div key={t.id} className={`nav-item ${tab === t.id ? "active" : ""}`} onClick={() => setTab(t.id)}>{t.label}</div>
        ))}
      </div>
      <div className="main">
        {tab === "manuals" && <ManualsPanel />}
        {tab === "voc" && <VocPanel />}
        {tab === "commands" && <CommandsPanel />}
        {tab === "system" && <SystemPanel />}
        {tab === "settings" && <SettingsPanel />}
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
