# 개발/데모용. 실제 vLLM/GPU 없이 전체 흐름을 확인한다.
#   docker compose -f docker-compose.dev.yml up -d --build
# dev는 편의를 위해 포트를 열어두고 비밀번호도 고정값을 쓴다(운영에 사용 금지).

x-pg-pass: &pgpass devpass
x-config-dsn: &configdsn postgresql://agent:devpass@postgres:5432/platform_config

# 폐쇄망: 사내 미러 레지스트리를 .env로 지정한다(기본은 공개 레지스트리).
#   REGISTRY_DOCKERHUB=repository.samsungds.net/proxy-docker-registry-1.docker.io
#   REGISTRY_GHCR=repository.samsungds.net/proxy-docker-ghcr.io
# 빌드 베이스(python)도 미러에서 받도록 build args로 전달한다.
x-py-build-args: &pyargs
  PYTHON_IMAGE: ${REGISTRY_DOCKERHUB:-docker.io}/python:3.12-slim
  # 폐쇄망 pip 미러/프록시(.env). 비우면 공개 PyPI 직접.
  PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
  PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
  BUILD_PROXY: ${BUILD_PROXY:-}
  NO_PROXY: ${NO_PROXY:-}

services:
  postgres:
    image: ${REGISTRY_DOCKERHUB:-docker.io}/pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: *pgpass
    volumes:
      - ./shared/init-db:/docker-entrypoint-initdb.d
    # 호스트 포트 충돌 시 .env에서 *_PORT 변수만 바꾸면 된다(컨테이너 내부 포트는 고정).
    ports: ["${PG_PORT:-5432}:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 20

  db-init:
    build: { context: ., dockerfile: shared/Dockerfile.db-init, args: *pyargs }
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: *pgpass
      REDIS_HOST: ""          # dev에는 redis 없음 -> 임베딩 캐시 비활성
      MANUAL_MCP_URL: http://manual-mcp:8001/mcp
      COMMAND_MCP_URL: http://command-mcp:8002/mcp
      VOC_MCP_URL: http://voc-mcp:8003/mcp
      SYSTEM_MCP_URL: http://system-mcp:8004/mcp
    depends_on:
      postgres: { condition: service_healthy }
    restart: "no"

  # dev 전용: 설정을 mock vLLM으로 덮어쓴다 (db-init 이후 실행)
  dev-config:
    image: ${REGISTRY_DOCKERHUB:-docker.io}/postgres:16-alpine
    environment:
      PGPASSWORD: *pgpass
    entrypoint: >
      sh -c "psql -h postgres -U agent -d platform_config -c \"
        UPDATE platform_settings SET value='http://mock-vllm:8000/v1' WHERE key IN ('vllm_llm_base_url','vllm_embed_base_url');
        UPDATE platform_settings SET value='mock-llm' WHERE key='vllm_llm_model';
        UPDATE platform_settings SET value='mock-embed' WHERE key='vllm_embed_model';
        UPDATE platform_settings SET value='' WHERE key IN ('redis_url','rerank_base_url');\""
    depends_on:
      db-init: { condition: service_completed_successfully }
    restart: "no"

  mock-vllm:
    build: { context: ., dockerfile: dev/Dockerfile.mock, args: *pyargs }
    # 호스트 노출 불필요(agent가 도커 내부망 mock-vllm:8000으로 접속) → 8100 충돌을 피하려고
    # 기본적으로 호스트에 포트를 열지 않는다. 직접 curl 디버깅이 필요하면 아래 줄의 주석을 풀고
    # 빈 포트를 지정한다:  ports: ["8500:8000"] 등.
    # ports: ["${MOCK_VLLM_PORT:-8100}:8000"]

  manual-mcp:
    build: { context: ., dockerfile: mcp_servers/Dockerfile, args: *pyargs }
    command: ["python", "mcp_servers/manual_mcp/server.py"]
    environment: { CONFIG_DB_DSN: *configdsn, MCP_PORT: "8001" }
    ports: ["${MANUAL_MCP_PORT:-8501}:8001"]
    depends_on:
      dev-config: { condition: service_completed_successfully }

  command-mcp:
    build: { context: ., dockerfile: mcp_servers/Dockerfile, args: *pyargs }
    command: ["python", "mcp_servers/command_mcp/server.py"]
    environment: { CONFIG_DB_DSN: *configdsn, MCP_PORT: "8002" }
    ports: ["${COMMAND_MCP_PORT:-8502}:8002"]
    depends_on:
      dev-config: { condition: service_completed_successfully }

  voc-mcp:
    build: { context: ., dockerfile: mcp_servers/Dockerfile, args: *pyargs }
    command: ["python", "mcp_servers/voc_mcp/server.py"]
    environment: { CONFIG_DB_DSN: *configdsn, MCP_PORT: "8003" }
    ports: ["${VOC_MCP_PORT:-8503}:8003"]
    depends_on:
      dev-config: { condition: service_completed_successfully }

  system-mcp:
    build: { context: ., dockerfile: mcp_servers/Dockerfile, args: *pyargs }
    command: ["python", "mcp_servers/system_mcp/server.py"]
    environment: { CONFIG_DB_DSN: *configdsn, MCP_PORT: "8004" }
    ports: ["${SYSTEM_MCP_PORT:-8504}:8004"]
    depends_on:
      dev-config: { condition: service_completed_successfully }

  agent-server:
    build: { context: ., dockerfile: agent_server/Dockerfile, args: *pyargs }
    environment:
      CONFIG_DB_DSN: *configdsn
      # LANGFUSE 키 없음 -> 트레이싱 자동 비활성화
      # 호스트 8000이 이미 사용 중이라 8500으로 노출(외부 VOC agent가 접속/방화벽 개통 대상 포트)
    ports: ["${AGENT_PORT:-8500}:8000"]
    depends_on:
      dev-config: { condition: service_completed_successfully }
      mock-vllm: { condition: service_started }
      manual-mcp: { condition: service_started }
      command-mcp: { condition: service_started }
      voc-mcp: { condition: service_started }
      system-mcp: { condition: service_started }

  admin-console:
    build: { context: ., dockerfile: dev/Dockerfile.admin-dev, args: *pyargs }
    environment:
      CONFIG_DB_DSN: *configdsn
      ADMIN_USER: admin
      ADMIN_PASSWORD: admin
    ports: ["${ADMIN_PORT:-8080}:8080"]
    depends_on:
      dev-config: { condition: service_completed_successfully }

  open-webui:
    image: ${REGISTRY_GHCR:-ghcr.io}/open-webui/open-webui:v0.6.5
    environment:
      OPENAI_API_BASE_URL: http://agent-server:8000/v1
      OPENAI_API_KEY: not-needed
      WEBUI_AUTH: "false"
    ports: ["${OPENWEBUI_PORT:-3000}:8080"]
    depends_on:
      agent-server: { condition: service_started }
